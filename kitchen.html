<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berdys Kitchen Screen</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#ff6600;
    text-align:center;
    padding:15px;
    font-size:30px;
    font-weight:bold;
}

.orders{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.order{
    background:#222;
    border-radius:15px;
    padding:20px;
    border:3px solid #444;
}

.orderNo{
    font-size:42px;
    font-weight:bold;
    color:#ffd700;
}

.date{
    color:#ccc;
    margin-top:10px;
}

.items{
    margin-top:15px;
    font-size:22px;
}

.item{
    padding:6px 0;
}

.status{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

.new{
    background:#dc3545;
}

.preparing{
    background:#ff9800;
}

.ready{
    background:#28a745;
}

.total{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
}

.empty{
    text-align:center;
    font-size:30px;
    margin-top:80px;
}

</style>
</head>

<body>

<div class="header">
🍗 BERDYS KITCHEN DISPLAY
</div>

<div id="orders" class="orders">
</div>

<script>

const SUPABASE_URL =
"https://lppfbiskcuiopzrjensa.supabase.co";

const SUPABASE_KEY =
"sb_publishable_iRQW5dIMA5dcXKsoRnF6Qg_oRVQLNyp";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function loadOrders(){

    const { data, error } =
    await supabase
    .from("orders")
    .select("*")
    .order("orderno",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    renderOrders(data);
}

function renderOrders(data){

    const activeOrders =
    data.filter(order =>
        order.status !== "Delivered"
    );

    if(activeOrders.length === 0){

        document.getElementById("orders")
        .innerHTML =
        `<div class="empty">
        No Active Orders
        </div>`;

        return;
    }

    let html = "";

    activeOrders.forEach(order=>{

        let itemsHTML = "";

        if(Array.isArray(order.items)){

            order.items.forEach(item=>{

                itemsHTML += `
                <div class="item">
                • ${item.name} x${item.qty}
                </div>`;
            });
        }

        let statusClass = "new";

        if(order.status==="Preparing"){
            statusClass="preparing";
        }

        if(order.status==="Ready"){
            statusClass="ready";
        }

        html += `
        <div class="order">

            <div class="orderNo">
            #${order.orderno}
            </div>

            <div class="date">
            ${order.orderdate}
            </div>

            <div class="items">
            ${itemsHTML}
            </div>

            <div class="total">
            ₹${order.total}
            </div>

            <div class="status ${statusClass}">
            ${order.status}
            </div>

        </div>`;
    });

    document.getElementById("orders")
    .innerHTML = html;
}

loadOrders();

setInterval(loadOrders,3000);

</script>

</body>
</html>
