<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berdys Ordering</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}
.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.add{
    background:green;
    color:white;
}
.place{
    width:100%;
    background:#ff6600;
    color:white;
    margin-top:10px;
}
.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
<h1>🍗 Berdys Chicken</h1>
</div>

<div class="products">

<div class="card">
<h3>Chicken Burger</h3>
<p>₹120</p>
<button class="add" onclick="addItem('Chicken Burger',120)">Add</button>
</div>

<div class="card">
<h3>Chicken Wrap</h3>
<p>₹150</p>
<button class="add" onclick="addItem('Chicken Wrap',150)">Add</button>
</div>

<div class="card">
<h3>Wings 6pc</h3>
<p>₹180</p>
<button class="add" onclick="addItem('Wings 6pc',180)">Add</button>
</div>

<div class="card">
<h3>Fries</h3>
<p>₹80</p>
<button class="add" onclick="addItem('Fries',80)">Add</button>
</div>

</div>

<div class="cart">
<h2 id="orderno">Order #Loading...</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="place" onclick="placeOrder()">
Place Order
</button>
</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  "https://lppfbiskcuiopzrjensa.supabase.co",
  "sb_publishable_iRQW5dIMA5dcXKsoRnF6Qg_oRVQLNyp"
);

let cart = [];
let currentOrderNo = 101;

window.addItem = function(name, price){

    const existing =
    cart.find(x => x.name === name);

    if(existing){
        existing.qty++;
    }else{
        cart.push({
            name,
            price,
            qty:1
        });
    }

    renderCart();
}

function renderCart(){

    let html = "";
    let total = 0;

    cart.forEach(item => {

        total += item.price * item.qty;

        html += `
        <div class="cart-item">
            <div>${item.name} x${item.qty}</div>
            <div>₹${item.price * item.qty}</div>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML =
    html;

    document.getElementById("total").innerText =
    total;
}

async function loadOrderNumber(){

    const { data, error } =
    await supabase
    .from("orders")
    .select("orderno")
    .order("orderno",{ascending:false})
    .limit(1);

    if(error){
        console.error(error);
        document.getElementById("orderNumber")
        .innerText = "Order #101";
        return;
    }

    if(data.length > 0){
        currentOrderNo =
        Number(data[0].orderno) + 1;
    }

    document.getElementById("orderNumber")
    .innerText =
    "Order #" + currentOrderNo;
}

window.placeOrder = async function(){

    if(cart.length === 0){
        alert("Cart Empty");
        return;
    }

    let total = 0;

    cart.forEach(i => {
        total += i.price * i.qty;
    });

    const { error } =
    await supabase
    .from("orders")
    .insert([{
        order_number: currentOrderNo,
        order_date: new Date().toLocaleString(),
        items: cart,
        total: total,
        status: "New"
    }]);

    if(error){
        console.error(error);
        alert(error.message);
        return;
    }

    alert(
      "Order #" +
      currentOrderNo +
      " Placed Successfully"
    );

    cart = [];

    renderCart();

    currentOrderNo++;

    document.getElementById("orderNumber")
    .innerText =
    "Order #" + currentOrderNo;
}

window.clearCart = function(){

    cart = [];

    renderCart();
}

loadOrderNumber();

</script>
