<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berdys Ordering</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}
.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.add{
    background:green;
    color:white;
}
.place{
    width:100%;
    background:#ff6600;
    color:white;
    margin-top:10px;
}
.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
<h1>🍗 Berdys Chicken</h1>
</div>

<div class="products">

<div class="card">
<h3>Chicken Burger</h3>
<p>₹120</p>
<button class="add" onclick="addItem('Chicken Burger',120)">Add</button>
</div>

<div class="card">
<h3>Chicken Wrap</h3>
<p>₹150</p>
<button class="add" onclick="addItem('Chicken Wrap',150)">Add</button>
</div>

<div class="card">
<h3>Wings 6pc</h3>
<p>₹180</p>
<button class="add" onclick="addItem('Wings 6pc',180)">Add</button>
</div>

<div class="card">
<h3>Fries</h3>
<p>₹80</p>
<button class="add" onclick="addItem('Fries',80)">Add</button>
</div>

</div>

<div class="cart">
<h2 id="orderno">Order #Loading...</h2>
<input
id="customerName"
type="text"
placeholder="Enter Your Name"
style="width:100%;padding:10px;margin-bottom:10px;">

<select
id="tableNumber"
style="width:100%;padding:10px;margin-bottom:10px;">

<option value="">Select Table</option>
<option value="1">Table 1</option>
<option value="2">Table 2</option>
<option value="3">Table 3</option>
<option value="4">Table 4</option>
<option value="5">Table 5</option>

</select>
<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="place" onclick="placeOrder()">
Place Order
</button>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  "https://lppfbiskcuiopzrjensa.supabase.co",
  "sb_publishable_iRQW5dIMA5dcXKsoRnF6Qg_oRVQLNyp"
);

let cart = [];
let currentOrderNo = 101;

async function loadOrderNumber() {

    const { data, error } = await supabase
        .from("orders")
        .select("order_number")
        .order("order_number", { ascending: false })
        .limit(1);

    if (!error && data.length > 0) {
        currentOrderNo = Number(data[0].order_number) + 1;
    }

    document.getElementById("orderno").innerText =
        "Order #" + currentOrderNo;
}

window.addItem = function(name, price) {

    const existing = cart.find(x => x.name === name);

    if (existing) {
        existing.qty++;
    } else {
        cart.push({
            name: name,
            price: price,
            qty: 1
        });
    }

    renderCart();
};

function renderCart() {

    let html = "";
    let total = 0;

    cart.forEach(item => {

        total += item.price * item.qty;

        html += `
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span>${item.name} x${item.qty}</span>
            <span>₹${item.price * item.qty}</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = html;
    document.getElementById("total").innerText = total;
}

window.placeOrder = async function() {

    const customerName =
    document.getElementById("customerName").value.trim();

    const tableNumber =
    document.getElementById("tableNumber").value;

    if (!customerName) {
        alert("Please Enter Your Name");
        return;
    }

    if (!tableNumber) {
        alert("Please Select Table Number");
        return;
    }

    if (cart.length === 0) {
        alert("Cart Empty");
        return;
    }

    let total = 0;

    cart.forEach(item => {
        total += item.price * item.qty;
    });

    const { error } = await supabase
        .from("orders")
        .insert([{
            order_number: currentOrderNo,
            order_date: new Date().toLocaleString(),
            customer_name: customerName,
            table_number: tableNumber,
            payment_status: "Unpaid",
            items: cart,
            total: total,
            status: "New"
        }]);

    if (error) {
        console.error(error);
        alert(error.message);
        return;
    }

    alert(
        "Order #" +
        currentOrderNo +
        " Placed Successfully"
    );

    cart = [];

    renderCart();

    document.getElementById("customerName").value = "";
    document.getElementById("tableNumber").value = "";

    currentOrderNo++;

    document.getElementById("orderno").innerText =
        "Order #" + currentOrderNo;
};

loadOrderNumber();
</script>


</body>
</html>
