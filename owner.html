<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berdys Owner Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}

.login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.login input{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

.login button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:green;
    color:white;
    cursor:pointer;
}

.dashboard{
    display:none;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.order{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="header">
    <h1>🍗 Berdys Owner Dashboard</h1>
</div>

<div class="login" id="loginBox">
    <h2>Owner Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
    <div class="card">
        <h2>Total Orders: <span id="totalOrders">0</span></h2>
        <h2>Total Sales: ₹<span id="totalSales">0</span></h2>
    </div>

    <div id="orders"></div>
</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2';

const OWNER_PASSWORD = "1234";

const supabase = createClient(
    "https://lppfbiskcuiopzrjensa.supabase.co",
    "sb_publishable_iRQW5dIMA5dcXKsoRnF6Qg_oRVQLNyp"
);

window.login = async function(){

    const pass =
    document.getElementById("password").value;

    if(pass !== OWNER_PASSWORD){
        alert("Wrong Password");
        return;
    }

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    await loadOrders();

    setInterval(loadOrders,5000);
}

async function loadOrders(){

    const { data, error } =
    await supabase
    .from("orders")
    .select("*")
    .order("order_number",{ascending:false});

    if(error){
        console.error(error);
        return;
    }

    document.getElementById("totalOrders").textContent =
    data.length;

    let sales = 0;

    data.forEach(order=>{
        sales += Number(order.total || 0);
    });

    document.getElementById("totalSales").textContent =
    sales;

    let html = "";

    data.forEach(order=>{

        let itemsHTML = "";

        if(Array.isArray(order.items)){

            order.items.forEach(item=>{

                itemsHTML += `
                <li>
                ${item.name} x${item.qty}
                </li>`;
            });
        }

        html += `
        <div class="order">

            <h3>Order #${order.order_number}</h3>

            <p>${order.order_date}</p>

            <ul>
                ${itemsHTML}
            </ul>

            <h4>Total ₹${order.total}</h4>

            <p>Status: ${order.status}</p>

        </div>`;
    });

    document.getElementById("orders").innerHTML =
    html;
}

</script>

</body>
</html>
